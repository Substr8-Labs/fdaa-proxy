version: '3.8'

services:
  mcp-server:
    image: substr8/mcp-server:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    ports:
      - "3456:3456"
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3456
      - MCP_REQUIRE_AUTH=true
      - CIA_AUDIT_DB=/data/anthropic-audit.db
    volumes:
      - mcp-data:/data
      - /home/node/.openclaw/workspace/fdaa-proxy/data:/data:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: overlay

volumes:
  mcp-data:
