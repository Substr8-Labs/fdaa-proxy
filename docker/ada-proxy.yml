# Ada's FDAA Proxy - wraps native OpenClaw gateway
#
# Deploy: docker stack deploy -c ada-proxy.yml ada

version: "3.8"

networks:
  ada-net:
    driver: overlay

volumes:
  ada-data:

services:
  fdaa-proxy:
    image: fdaa-proxy:latest
    command:
      - fdaa-proxy
      - openclaw
      - start
      - --host=0.0.0.0
      - --port=8800
      - --upstream=ws://host.docker.internal:18789
      - --audit-db=/data/audit.db
      - --ril
      - --ril-mode=permissive
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18800:8800"  # Governed gateway
    volumes:
      - ada-data:/data
    networks:
      - ada-net
    deploy:
      mode: replicated
      replicas: 1
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost',8800)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
