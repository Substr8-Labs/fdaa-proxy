# TowerHQ FDAA Proxy Stack v2
# 
# Full FDAA infrastructure with:
# - ACC cryptographic auth
# - CIA (Context Integrity Adapter) for LLM request validation
# - DCT audit logging
#
# Architecture:
#   Bridge → FDAA Proxy → Shared Gateway → Anthropic Proxy (CIA) → Anthropic API
#
# Deploy: docker stack deploy -c towerhq-stack-v2.yml towerhq

version: "3.8"

networks:
  towerhq-gateways:
    external: true

volumes:
  fdaa-data:
  ril-audit:
  acc-keys:

configs:
  acc-public-key:
    file: /home/node/.openclaw/secrets/acc-keys/public.key
  shared-gateway-auth:
    external: true

secrets:
  acc-private-key:
    file: /home/node/.openclaw/secrets/acc-keys/private.key
  anthropic-api-key:
    external: true
    name: platform_anthropic-api-key

services:
  # ==========================================================================
  # Anthropic Proxy - CIA Runtime Integrity Layer
  # ==========================================================================
  # This MUST be the egress point for all LLM traffic.
  # Validates/repairs tool_use/tool_result pairing before requests hit Anthropic.
  
  anthropic-proxy:
    image: fdaa-proxy:latest
    entrypoint:
      - sh
      - -c
      - |
        export ANTHROPIC_API_KEY=$$(cat /run/secrets/anthropic-api-key)
        exec fdaa-proxy anthropic start \
          --host=0.0.0.0 \
          --port=18800 \
          --cia-mode=permissive \
          --audit-db=/data/ril-audit.db
    secrets:
      - anthropic-api-key
    volumes:
      - ril-audit:/data
    networks:
      - towerhq-gateways
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18800/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # Shared OpenClaw Gateway
  # ==========================================================================
  # Routes through Anthropic Proxy for CIA protection
  
  shared-gateway:
    image: towerhq/gateway-shared:v9
    ports:
      - "19000:18789"
    environment:
      # Point to Anthropic Proxy instead of direct Anthropic API
      - ANTHROPIC_BASE_URL=http://anthropic-proxy:18800
      - ANTHROPIC_API_KEY=proxy-managed
    configs:
      - source: shared-gateway-auth
        target: /runtime-state/agents/main/agent/auth-profiles.json
    networks:
      - towerhq-gateways
    depends_on:
      - anthropic-proxy
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:18789/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==========================================================================
  # FDAA Proxy - Governed OpenClaw Gateway (WebSocket)
  # ==========================================================================
  
  fdaa-proxy:
    image: fdaa-proxy:latest
    command:
      - fdaa-proxy
      - openclaw
      - start
      - --host=0.0.0.0
      - --port=8800
      - --upstream=ws://shared-gateway:18789
      - --audit-db=/data/audit.db
      - --acc-key=/run/configs/public.key
      - --acc-issuer=https://acc.substr8labs.com
    environment:
      - OPENCLAW_GATEWAY_TOKEN=towerhq-internal-token-2026
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=fdaa-proxy
    configs:
      - source: acc-public-key
        target: /run/configs/public.key
    volumes:
      - fdaa-data:/data
    networks:
      - towerhq-gateways
    depends_on:
      - shared-gateway
    deploy:
      mode: replicated
      replicas: 1
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost',8800)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==========================================================================
  # HTTP Bridge - REST to WebSocket
  # ==========================================================================
  
  bridge:
    image: towerhq/bridge:v17
    ports:
      - "3100:3100"
    environment:
      - BRIDGE_PORT=3100
      - BRIDGE_SECRET=${BRIDGE_SECRET}
      - GATEWAY_URL=ws://fdaa-proxy:8800
      - GATEWAY_TOKEN=towerhq-internal-token-2026
    networks:
      - towerhq-gateways
    depends_on:
      - fdaa-proxy
    deploy:
      mode: replicated
      replicas: 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==========================================================================
  # Observability
  # ==========================================================================
  
  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - towerhq-gateways
    deploy:
      mode: replicated
      replicas: 1

  # ==========================================================================
  # Verification UI
  # ==========================================================================
  
  verify:
    image: fdaa-proxy:latest
    command:
      - fdaa-proxy
      - verify
      - serve
      - --host=0.0.0.0
      - --port=8080
      - --jaeger-url=http://jaeger:16686
      - --dct-path=/data
    ports:
      - "8080:8080"
    volumes:
      - fdaa-data:/data:ro
      - ril-audit:/data/anthropic:ro
    networks:
      - towerhq-gateways
    deploy:
      mode: replicated
      replicas: 1
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost',8080)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==========================================================================
  # RIL Status Sidecar (for monitoring)
  # ==========================================================================
  
  ril-status:
    image: fdaa-proxy:latest
    command:
      - sh
      - -c
      - |
        while true; do
          fdaa-proxy ril status --port 18800 --json > /data/ril-status.json 2>/dev/null || echo '{"summary":"error"}' > /data/ril-status.json
          sleep 60
        done
    volumes:
      - ril-audit:/data
    networks:
      - towerhq-gateways
    depends_on:
      - anthropic-proxy
    deploy:
      mode: replicated
      replicas: 1
