# Substr8 Platform - Local Development Stack
# Generated by: substr8 platform init
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f
#   docker-compose down
#
version: "3.8"

networks:
  substr8:
    driver: bridge

volumes:
  postgres-data:
  runproof-data:

services:
  # === Database ===
  postgres:
    image: pgvector/pgvector:pg15
    container_name: substr8-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gam}
      POSTGRES_USER: ${POSTGRES_USER:-gam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-substr8-dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - substr8
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gam"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === GAM - Memory Service ===
  gam:
    image: ${REGISTRY:-ghcr.io/substr8-labs}/gam:${GAM_VERSION:-latest}
    container_name: substr8-gam
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gam}:${POSTGRES_PASSWORD:-substr8-dev}@postgres:5432/${POSTGRES_DB:-gam}
      GAM_PORT: 8091
    ports:
      - "${GAM_PORT:-8091}:8091"
    networks:
      - substr8
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # === ACC - Agent Capability Control ===
  acc:
    image: ${REGISTRY:-ghcr.io/substr8-labs}/acc:${ACC_VERSION:-latest}
    container_name: substr8-acc
    environment:
      ACC_PORT: 8096
    ports:
      - "${ACC_PORT:-8096}:8096"
    networks:
      - substr8
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8096/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # === RunProof Builder ===
  runproof:
    image: ${REGISTRY:-ghcr.io/substr8-labs}/runproof:${RUNPROOF_VERSION:-latest}
    container_name: substr8-runproof
    depends_on:
      - gam
    environment:
      RUNPROOF_PORT: 8097
      GAM_URL: http://gam:8091
      REGISTRY_URL: http://registry:8098
    volumes:
      - runproof-data:/app/data
    ports:
      - "${RUNPROOF_PORT:-8097}:8097"
    networks:
      - substr8
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8097/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # === Governed Flow ===
  governed-flow:
    image: ${REGISTRY:-ghcr.io/substr8-labs}/governed-flow:${GOVERNED_FLOW_VERSION:-latest}
    container_name: substr8-governed-flow
    depends_on:
      - gam
      - acc
      - runproof
    environment:
      GOVERNED_FLOW_PORT: 8100
      GAM_URL: http://gam:8091
      ACC_URL: http://acc:8096
      RUNPROOF_URL: http://runproof:8097
    ports:
      - "${GOVERNED_FLOW_PORT:-8100}:8100"
    networks:
      - substr8
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # === Governance Operator (UI) ===
  governance-operator:
    image: ${REGISTRY:-ghcr.io/substr8-labs}/governance-operator:${GOVERNANCE_OPERATOR_VERSION:-latest}
    container_name: substr8-governance-operator
    depends_on:
      - gam
      - runproof
    environment:
      GOVERNANCE_OPERATOR_PORT: 8101
      GAM_URL: http://gam:8091
      RUNPROOF_URL: http://runproof:8097
    ports:
      - "${GOVERNANCE_OPERATOR_PORT:-8101}:8101"
    networks:
      - substr8
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8101/health"]
      interval: 30s
      timeout: 5s
      retries: 3
