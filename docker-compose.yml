version: "3.8"

services:
  fdaa-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18766:8766"
    volumes:
      - fdaa-data:/data
    environment:
      - FDAA_HOST=0.0.0.0
      - FDAA_PORT=8766
      - RIL_ENABLED=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8766/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  fdaa-data:
